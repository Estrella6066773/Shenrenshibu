# 正文层：内部链接与 manifest 一致性
name: StoryLib link check

on:
  push:
    paths:
      - "正文/**"
  pull_request:
    paths:
      - "正文/**"

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run check-links.py
        run: python 正文/管线/检查/check-links.py
