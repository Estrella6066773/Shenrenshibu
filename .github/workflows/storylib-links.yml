# 设定设计层：内部链接与 manifest 一致性
name: StoryLib link check

on:
  push:
    paths:
      - "Docs/设定设计/**"
      - ".github/workflows/storylib-links.yml"
  pull_request:
    paths:
      - "Docs/设定设计/**"
      - ".github/workflows/storylib-links.yml"

jobs:
  check-links:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install checker dependencies
        run: pip install -r 设定设计/工具/检查/requirements.txt

      - name: Run check-links.py
        run: python 设定设计/工具/检查/check-links.py
